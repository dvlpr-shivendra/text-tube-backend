services:
  mongodb:
    image: mongo:7
    container_name: text-tube-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: text_tube
    networks:
      - text-tube-network

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.auth
    container_name: text-tube-auth
    ports:
      - "50051:50051"
    environment:
      - AUTH_SERVICE_PORT=50051
      - MONGO_URI=mongodb://mongodb:27017
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - OTEL_COLLECTOR_ADDR=otel-collector:4317
    depends_on:
      mongodb:
        condition: service_started
      otel-collector:
        condition: service_started
    networks:
      - text-tube-network

  video-service:
    build:
      context: .
      dockerfile: Dockerfile.video
    container_name: text-tube-video
    ports:
      - "50052:50052"
    environment:
      - VIDEO_SERVICE_PORT=50052
      - MONGO_URI=mongodb://mongodb:27017
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OTEL_COLLECTOR_ADDR=otel-collector:4317
    depends_on:
      mongodb:
        condition: service_started
      otel-collector:
        condition: service_started
    networks:
      - text-tube-network

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: text-tube-gateway
    ports:
      - "8080:8080"
    environment:
      - GATEWAY_PORT=8080
      - AUTH_SERVICE_ADDR=auth-service:50051
      - VIDEO_SERVICE_ADDR=video-service:50052
      - OTEL_COLLECTOR_ADDR=otel-collector:4317
    depends_on:
      auth-service:
        condition: service_started
      video-service:
        condition: service_started
      otel-collector:
        condition: service_started
    networks:
      - text-tube-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: text-tube-jaeger
    ports:
      - "16686:16686" # Jaeger UI
      - "14268:14268" # Jaeger collector (HTTP)
      - "4319:4317"   # OTLP gRPC exposed to host (offset to avoid conflict with otel-collector)
    networks:
      - text-tube-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: text-tube-otel-collector
    command: ["--config=/etc/otel-config.yaml"]
    volumes:
      - ./observability/otel-config.yaml:/etc/otel-config.yaml
      # Bind-mount host root filesystem so hostmetrics reads real host stats.
      # The root_path in otel-config.yaml points to /hostfs.
      - /:/hostfs:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics exporter
      - "13133:13133" # Health check endpoint
    depends_on:
      - jaeger
    networks:
      - text-tube-network

  prometheus:
    image: prom/prometheus:latest
    container_name: text-tube-prometheus
    volumes:
      - ./observability/prometheus.yaml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      otel-collector:
        condition: service_started
    networks:
      - text-tube-network

  grafana:
    image: grafana/grafana:latest
    container_name: text-tube-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      # Named volume preserves dashboards, alert rules, and user state across restarts.
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - text-tube-network

volumes:
  mongo-data:
  prometheus-data:
  grafana-data:

networks:
  text-tube-network:
    driver: bridge
