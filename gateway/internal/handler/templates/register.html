{{define "content"}}
<table width="100%" border="0" cellpadding="10">
  <tr>
    <td align="center">
      <h2>Register</h2>
      {{if .Error}}<p><font color="#FF0000"><b>{{.Error}}</b></font></p>{{end}}
      <form action="/register" method="POST">
        <table border="0">
          <tr>
            <td>Username:</td>
            <td><input type="text" name="username" size="30" style="height: 50px; font-size: 24px; background-color: #333333; color: #FFFFFF; border: 2px solid #FFFFFF;"></td>
          </tr>
          <tr>
            <td>Email:</td>
            <td><input type="text" name="email" size="30" style="height: 50px; font-size: 24px; background-color: #333333; color: #FFFFFF; border: 2px solid #FFFFFF;"></td>
          </tr>
          <tr>
            <td>Password:</td>
            <td><input type="password" name="password" size="30" style="height: 50px; font-size: 24px; background-color: #333333; color: #FFFFFF; border: 2px solid #FFFFFF;"></td>
          </tr>
          <tr>
            <td colspan="2" align="center">
              <br>
              <input type="submit" value=" REGISTER " style="height: 80px; width: 200px; font-size: 30px; font-weight: bold; background-color: #FFFFFF; color: #000000;">
            </td>
          </tr>
        </table>
      </form>
      <br>
      <br>
      <a href="/login"><font size="4">Already have an account? Login here</font></a>
    </td>
  </tr>
</table>
{{end}}
